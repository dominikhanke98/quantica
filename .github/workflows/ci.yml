name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · typecheck · test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy quantica

      - name: Pytest (excludes QuantLib benchmarks)
        run: pytest --cov=quantica --cov-report=term-missing -m "not benchmark"

  benchmark:
    name: benchmark vs QuantLib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (editable, with dev + benchmark extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,benchmark]"

      # Runs only the QuantLib cross-checks. Kept in a separate job so a
      # QuantLib packaging hiccup never blocks the core quality gate.
      - name: Pytest (benchmarks only)
        run: pytest -m benchmark
